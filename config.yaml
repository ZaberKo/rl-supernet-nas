env:
  env_id: ALE/SpaceInvaders-v5
  seed: 0
  image_size: 84
  vector_env_type: subproc
  atari_wrapper:
    noop_max: 30
    frame_skip: 4
    frame_stack: 4
    terminal_on_life_loss: true
    clip_reward: true
    action_repeat_probability: 0.0
    max_episode_steps: 2700 # 3 min
    normalize_observation: false
    normalize_reward: false
    normalize_clip_obs: 10.0
    normalize_gamma: 0.99

ppo:
  train_n_envs: 8
  eval_n_envs: 16
  eval_episodes: 16
  eval_freq: 102400 # training timesteps between stage1 evaluations; use 0 to disable
  eval_deterministic: true
  total_timesteps: 10000000
  features_dim: 256
  policy_backbone_lr: 1e-4
  policy_head_lr: 1e-4
  critic_lr: 1e-4
  projection_dim: 128
  predictor_hidden_dim: 512
  z_dyn_coef: 0.0
  ema_tau: 0.99
  n_steps: 128 # num rollout steps per env
  batch_size: 256 # minibatch for PPO update
  n_epochs: 4 # repeat rollout data for multiple epochs
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.1
  clip_range_vf: null
  normalize_advantage: true
  ent_coef: 0.01
  vf_coef: 0.5
  max_grad_norm: 0.5
  target_kl: null
  stats_window_size: 100
  tensorboard_log: null
  policy_net_arch: [256] # actor MLP head after the backbone
  value_net_arch: [256] # critic MLP head after the backbone
  use_sde: false
  sde_sample_freq: -1
  log_std_init: null
  ortho_init: true
  activation_fn: tanh # shared activation for policy_net_arch and value_net_arch hidden layers; SB3/rl_zoo3 Atari default
  device: auto
  quiet: false
