env:
  env_id: CartPole-v1
  seed: 0
  image_size: 64
  native_image_env: false
  vector_env_type: dummy
  frame_stack: 1
  atari_wrapper: none

ppo:
  train_n_envs: 1
  eval_n_envs: 1
  eval_deterministic: true
  total_timesteps: 1024
  features_dim: 256
  learning_rate: 0.0003
  head_lr: 0.0003
  n_steps: 128
  batch_size: 64
  n_epochs: 4
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  clip_range_vf: null
  normalize_advantage: true
  ent_coef: 0.0
  vf_coef: 0.5
  max_grad_norm: 0.5
  target_kl: null
  stats_window_size: 100
  tensorboard_log: null
  policy_hidden_sizes: ""
  device: auto
  progress_bar: false
  quiet: false
