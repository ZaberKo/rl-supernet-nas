env:
  env_id: ALE/Pong-v5
  seed: 0
  image_size: 84
  native_image_env: true
  vector_env_type: subproc
  frame_stack: 4
  atari_wrapper: sb3

ppo:
  train_n_envs: 4
  eval_n_envs: 1
  eval_deterministic: true
  total_timesteps: 50000
  features_dim: 256
  learning_rate: 0.00025
  head_lr: 0.00025
  n_steps: 128 # num rollout steps per env
  batch_size: 256 # minibatch for PPO update
  n_epochs: 4 # repeat rollout data for multiple epochs
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  clip_range_vf: null
  normalize_advantage: true
  ent_coef: 0.01
  vf_coef: 0.5
  max_grad_norm: 0.5
  target_kl: null
  stats_window_size: 100
  tensorboard_log: null
  policy_net_arch: [] # MLP header
  value_net_arch: [] # MLP header
  device: auto
  progress_bar: false
  quiet: false
